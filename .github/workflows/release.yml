name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target universal-apple-darwin'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # universal-apple-darwin requires both Mac targets
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install frontend dependencies
        run: npm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'MTGA Stat Assistant ${{ github.ref_name }}'
          releaseBody: |
            ## Installation

            **Windows:** Download and run the `.msi` installer. Windows SmartScreen may warn about an unknown publisher — click "More info" then "Run anyway". This is expected for unsigned community software.

            **macOS:** Download the `.dmg`, open it, and drag the app to Applications. On first launch, right-click the app and choose Open (required once for unsigned apps from outside the App Store).

            ## Requirements

            - MTGA installed with **Detailed Logs** enabled: Options → View Account → Detailed Logs (Plugin Support) → ON
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
